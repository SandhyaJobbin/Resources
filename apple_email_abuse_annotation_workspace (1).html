];

let cur = 0;
let state = scenarios.map(() => ({ severity: null, signals: [], action: null, notes: "", submitted: false, score: 0 }));

function toggleSignal(id) {
  if (state[cur].submitted) return;
  const arr = state[cur].signals;
  const idx = arr.indexOf(id);
  if (idx > -1) arr.splice(idx, 1); else arr.push(id);
  renderAnnotationForm();
}
function setSeverity(id) {
  if (state[cur].submitted) return;
  state[cur].severity = id;
  renderAnnotationForm();
}
function setAction(id) {
  if (state[cur].submitted) return;
  state[cur].action = id;
  renderAnnotationForm();
}

function canSubmit() {
  const s = state[cur];
  return s.severity && s.action && !s.submitted;
}

function submit() {
  const s = state[cur];
  const sc = scenarios[cur];
  if (!canSubmit()) return;
  s.submitted = true;

  const scoring = sc.scoring;
  let points = 0, maxPoints = 3;

  if (scoring.severity.correct.includes(s.severity)) points += 1;
  else if (scoring.severity.partial && scoring.severity.partial.includes(s.severity)) points += 0.5;

  const requiredSignals = scoring.signals.required;
  const partialSignals = scoring.signals.partial;
  if (requiredSignals.length === 0) {
    if (s.signals.length === 0 || s.signals.includes("none-detected")) points += 1;
    else points += 0.5;
  } else {
    const matched = requiredSignals.filter(r => s.signals.includes(r)).length;
    if (matched === requiredSignals.length) points += 1;
    else if (partialSignals && partialSignals.filter(p => s.signals.includes(p)).length >= 1) points += 0.5;
  }

  if (scoring.action.correct.includes(s.action)) points += 1;
  else if (scoring.action.partial && scoring.action.partial.includes(s.action)) points += 0.5;

  s.score = points;
  render();
}

function scoreLabel(pts) {
  if (pts >= 2.5) return { cls: "pass", head: "Strong annotation", icon: "✓" };
  if (pts >= 1.5) return { cls: "partial", head: "Partially correct", icon: "~" };
  return { cls: "fail", head: "Needs improvement", icon: "✗" };
}

  const s = state[cur];

  const sevHtml = severityOpts.map(o => {
    const active = s.severity === o.id;

  const sigHtml = signalOpts.map(o => {
    const active = s.signals.includes(o.id);
    return `<button class="pill${active ? ' active' : ''}" onclick="toggleSignal('${o.id}')" ${s.submitted?'disabled':''}>${o.label}</button>`;
  }).join('');

  const actHtml = actionOpts.map(o => {
    const active = s.action === o.id;
    return `<button class="pill${active ? ' active' : ''}" onclick="setAction('${o.id}')" ${s.submitted?'disabled':''}>${o.label}</button>`;
  }).join('');

  let resultHtml = '';
  if (s.submitted) {
    const lbl = scoreLabel(s.score);
    resultHtml = `<div class="result-panel ${lbl.cls} show">
      <div class="res-head ${lbl.cls}">${lbl.icon} ${lbl.head} (${s.score}/3 points)</div>
      <div class="res-body ${lbl.cls} res-detail">${sc.answer.reasoning}</div>
    </div>`;
  }

  document.getElementById('ann-form').innerHTML = `
    <div class="ann-section">
      <div class="ann-section-title">Annotation form</div>
      <div class="field-row">
        <div class="field-label">Severity</div>
        <div class="pill-group">${sevHtml}</div>
      </div>
      <div class="field-row">
        <div class="field-label">Abuse signals detected</div>
        <div class="field-hint">Select all that apply</div>
        <div class="pill-group">${sigHtml}</div>
      </div>
      <div class="field-row">
        <div class="field-label">Recommended action</div>
        <div class="pill-group">${actHtml}</div>
      </div>
      ${!s.submitted ? `<button class="submit-btn" onclick="submit()" ${canSubmit()?'':'disabled'}>Submit annotation</button>` : ''}
    </div>
    ${resultHtml}`;
}

function render() {
  const sc = scenarios[cur];
  document.getElementById('prog').style.width = `${((cur+1)/scenarios.length)*100}%`;

  let emailHtml = '';
  if (sc.email) {
    const e = sc.email;
    let rows = `<div class="erow"><span class="elabel">From</span><span class="evalue">${e.from}</span></div>`;
    if (e.replyTo && e.replyTo !== e.from) rows += `<div class="erow"><span class="elabel">Reply-To</span><span class="evalue" style="color:#A32D2D">${e.replyTo}</span></div>`;
    rows += `<div class="erow"><span class="elabel">To</span><span class="evalue">${e.to}</span></div>`;
    rows += `<div class="erow"><span class="elabel">Subject</span><span class="evalue subj">${e.subject}</span></div>`;
    emailHtml = `<div class="email-wrap"><div class="email-headers">${rows}</div><div class="email-body">${e.body}</div></div>`;
  }

  let ctxHtml = '';
  if (sc.context) {
    ctxHtml = `<div class="context-note"><div class="ctx-lbl">Annotator context</div><div class="ctx-body">${sc.context.replace(/\n/g,'<br>')}</div></div>`;
  }

  const answered = state.filter(s => s.submitted).length;

  document.getElementById('body').innerHTML = `
    <div class="sc-card">
      <div class="sc-top"><span class="sc-num">Scenario ${cur+1} of ${scenarios.length}</span></div>
      <div class="sc-title">${sc.title}</div>
      ${emailHtml}
      ${ctxHtml}
      <div class="divider"></div>
      <div id="ann-form"></div>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="go(${cur-1})" ${cur===0?'disabled':''}>← Previous</button>
      <span class="q-ctr">${answered} / ${scenarios.length} submitted</span>
      ${cur < scenarios.length-1
        ? `<button class="nav-btn" onclick="go(${cur+1})">Next →</button>`
        : `<button class="nav-btn" onclick="showScore()" ${answered<scenarios.length?'disabled':''}>View results →</button>`}
    </div>`;

  renderAnnotationForm();
}

function go(i) { cur = i; render(); }

function showScore() {
  const total = state.reduce((a,s) => a + s.score, 0);
  const maxTotal = scenarios.length * 3;
  const pct = Math.round((total/maxTotal)*100);

  let band, bStyle;
  if (pct >= 80) { band = 'Strong pass — recommend for interview'; bStyle = 'background:#EAF3DE;color:#27500A'; }
  else if (pct >= 60) { band = 'Borderline — consider calibration session'; bStyle = 'background:#FAEEDA;color:#633806'; }
  else { band = 'Does not meet threshold'; bStyle = 'background:#FCEBEB;color:#791F1F'; }

  const rows = state.map((s,i) => {
    const lbl = scoreLabel(s.score);
    return `<div class="brow"><span>Scenario ${i+1}</span><span style="color:${lbl.cls==='pass'?'#27500A':lbl.cls==='partial'?'#633806':'#791F1F'}">${s.score}/3</span></div>`;
  }).join('');

  document.getElementById('body').style.display = 'none';
  const sw = document.getElementById('score-wrap');
  sw.innerHTML = `
    <div class="score-big">${Math.round(total)}/${maxTotal}</div>
    <div class="score-sub">${pct}% — ${Math.round(total*10)/10} points out of ${maxTotal}</div>
    <div class="band" style="${bStyle}">${band}</div>
    <div class="breakdown">
      <p style="font-size:13px;font-weight:500;margin:0 0 8px;color:var(--color-text-secondary)">Per scenario</p>
      ${rows}
    </div>
    <button class="restart" onclick="restart()">← Retake</button>`;
  sw.classList.add('show');
  document.getElementById('prog').style.width = '100%';
}

function restart() {
  cur = 0;
  state = scenarios.map(() => ({ severity: null, signals: [], action: null, notes: "", submitted: false, score: 0 }));
  document.getElementById('score-wrap').classList.remove('show');
  document.getElementById('body').style.display = 'block';
  render();
}

render();
</script>
